{% extends "base.html" %}

<!--
  Site-wide <head> additions layered on top of Material's defaults
  (Material already emits title, description, canonical and Open Graph tags).
-->
{% block extrahead %}
  <!-- Search engine verification -->
  <meta name="msvalidate.01" content="REPLACE_WITH_BING_VERIFICATION_TOKEN" />

  <!-- Bot directives for rich snippets -->
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

  <!-- Per-page keywords (set via page front matter) -->
  {% if page and page.meta and page.meta.keywords %}
  <meta name="keywords" content="{{ page.meta.keywords }}">
  {% endif %}

  <!-- Social preview image fallback -->
  {% set og_image = "https://powerpointmcpserver.dev/assets/images/icon.png" %}
  <meta property="og:image" content="{{ og_image }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ og_image }}">

  <!-- Structured data: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "PowerPoint MCP Server",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Windows",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "description": "Control Microsoft PowerPoint with natural language through AI assistants like GitHub Copilot and Claude. Automate slides, shapes, tables, charts and export-to-verify visual checks.",
    "url": "https://powerpointmcpserver.dev/",
    "programmingLanguage": "C#",
    "downloadUrl": "https://www.nuget.org/packages/Sbroenne.PowerPointMcp.McpServer/",
    "codeRepository": "https://github.com/sbroenne/mcp-server-powerpoint",
    "keywords": "PowerPoint, automation, MCP, AI, slides, charts, COM interop, GitHub Copilot, Claude",
    "author": {
      "@type": "Person",
      "name": "Stefan Broenner"
    },
    "featureList": [
      "Slide and shape automation",
      "Table and chart creation",
      "Text frame formatting",
      "Export-to-verify visual checks",
      "MCP Server"
    ]
  }
  </script>
{% endblock %}
