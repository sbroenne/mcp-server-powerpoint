# GitHub CodeQL Analysis Workflow
# Performs advanced security scanning for code vulnerabilities

name: "CodeQL Advanced Security"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**.csproj'
      - '**.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**.csproj'
      - '**.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/codeql.yml'
  schedule:
    # Run CodeQL analysis every Monday at 10:00 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze Code with CodeQL
    # windows-latest is required to build net10.0-windows / COM interop
    # projects; this job only builds and statically analyzes code, it never
    # opens PowerPoint, so the lack of Office on hosted runners doesn't matter.
    runs-on: windows-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
        # CodeQL supports: 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Initializes the CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # NOTE: mcp-server-excel uses a custom ./.github/codeql/codeql-config.yml
        # (paths-ignore for tests/**, query-filters suppressing intentional
        # catch-all-exception/dynamic-call/GC patterns in COM interop code).
        # That config file has not been ported yet — this repo relies on the
        # default query suite for now. Port a PowerPointMcp equivalent config
        # (see mcp-server-excel/.github/codeql/codeql-config.yml) once the
        # Core/ComInterop/CLI/McpServer exception-handling and COM-dynamic-call
        # patterns stabilize, then wire it in here via `config-file:`.
        queries: +security-extended

    # Restore dependencies before build
    - name: Restore dependencies
      run: dotnet restore

    # Build the solution for CodeQL analysis
    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    # Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
        # Upload results even if there are errors
        upload: true
        # Output SARIF results
        output: sarif-results

    # Upload SARIF results as artifact for review
    - name: Upload CodeQL Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-sarif-results-${{ matrix.language }}
        path: sarif-results
        retention-days: 30

    # Create issue if critical vulnerabilities found
    - name: Check for Critical Issues
      if: failure()
      run: |
        Write-Output "⚠️ CodeQL found security issues. Review the Security tab."
      shell: pwsh
