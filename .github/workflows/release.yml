name: Release All Components

# Unified release workflow for all PowerPointMcp components:
# - MCP Server (standalone exe ZIP — primary) + NuGet (.NET tool — secondary)
# - CLI (standalone exe ZIP — primary) + NuGet (.NET tool — secondary)
# - VS Code Extension (VSIX + Marketplace)
# - MCPB (Claude Desktop bundle)
# - Agent Skills (ZIP package)
# - MCP Registry entry (server.json)
#
# All components are released with the same version.
# Trigger: workflow_dispatch with version bump (major/minor/patch) or custom version.
# The workflow auto-calculates the next version from the latest git tag,
# creates the git tag after successful builds, then creates the GitHub release.
#
# Required GitHub Secrets:
# - NUGET_USER: Your NuGet.org username (profile name, NOT email)
# - VSCE_TOKEN: VS Code Marketplace PAT
#
on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        default: 'patch'
        options:
          - major
          - minor
          - patch
      custom_version:
        description: 'Custom version (e.g., 1.2.3, overrides version_bump)'
        required: false
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  # =============================================================================
  # Job 0: Calculate Version
  # =============================================================================
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calculate_version.outputs.version }}
      tag: ${{ steps.calculate_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history and tags

      - name: Calculate version
        id: calculate_version
        run: |
          # If custom version is provided, use it
          if [ -n "${{ inputs.custom_version }}" ]; then
            VERSION="${{ inputs.custom_version }}"
            echo "Using custom version: ${VERSION}"
          else
            # Get the latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag: ${LATEST_TAG}"

            # Remove 'v' prefix if present
            CURRENT_VERSION="${LATEST_TAG#v}"
            echo "Current version: ${CURRENT_VERSION}"

            # Parse version components
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

            # Increment based on bump type
            case "${{ inputs.version_bump }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "New version: ${VERSION}"
          fi

          TAG="v${VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # Job 1: Build CLI (standalone exe — primary + NuGet pack — secondary)
  # =============================================================================
  build-cli:
    name: CLI
    needs: [version]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Restore
      run: dotnet restore src/PowerPointMcp.CLI/PowerPointMcp.CLI.csproj

    - name: Build CLI
      run: dotnet build src/PowerPointMcp.CLI/PowerPointMcp.CLI.csproj --configuration Release --no-restore -p:Version=${{ env.VERSION }} -p:AssemblyVersion=${{ env.VERSION }}.0 -p:FileVersion=${{ env.VERSION }}.0

    - name: Pack CLI NuGet (secondary distribution)
      run: dotnet pack src/PowerPointMcp.CLI/PowerPointMcp.CLI.csproj --configuration Release --no-build --output ./cli-nupkg -p:Version=${{ env.VERSION }}

    - name: Publish CLI (standalone exe — primary distribution)
      run: |
        dotnet publish src/PowerPointMcp.CLI/PowerPointMcp.CLI.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -p:PublishReadyToRun=false `
          -p:Version=${{ env.VERSION }} `
          -p:AssemblyVersion=${{ env.VERSION }}.0 `
          -p:FileVersion=${{ env.VERSION }}.0 `
          -p:NuGetAudit=false `
          --output ./cli-publish
      shell: pwsh

    - name: Create CLI ZIP
      run: |
        $version = $env:VERSION
        New-Item -ItemType Directory -Path "cli-release" -Force
        Copy-Item "cli-publish/powerpointcli.exe" "cli-release/"
        Copy-Item "README.md" "cli-release/"
        Copy-Item "LICENSE" "cli-release/"
        Compress-Archive -Path "cli-release/*" -DestinationPath "PowerPointMcp-CLI-$version-windows.zip"
      shell: pwsh

    - name: Upload CLI ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cli-zip
        path: PowerPointMcp-CLI-*-windows.zip

    - name: Upload CLI NuGet Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cli-nupkg
        path: cli-nupkg/*.nupkg

    - name: Upload CLI Build Output (for other jobs)
      uses: actions/upload-artifact@v4
      with:
        name: cli-build
        path: cli-publish/

  # =============================================================================
  # Job 2: Build MCP Server (standalone exe — primary + NuGet pack — secondary)
  # =============================================================================
  build-mcp-server:
    name: MCP Server
    needs: [version]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
        Write-Output "Version: $version"
      shell: pwsh

    - name: Update Project Versions
      run: |
        $version = $env:VERSION

        # Update MCP Registry server.json (top-level version and package version)
        $serverJsonPath = "src/PowerPointMcp.McpServer/.mcp/server.json"
        $serverContent = Get-Content $serverJsonPath -Raw
        $serverContent = $serverContent -replace '("version":\s*)"[\d\.]+"(\s*,\s*\n\s*"packages")' , "`$1`"$version`"`$2"
        $serverContent = $serverContent -replace '("identifier":\s*"Sbroenne\.PowerPointMcp\.McpServer",\s*\n\s*"version":\s*)"[\d\.]+"', "`$1`"$version`""
        Set-Content $serverJsonPath $serverContent
      shell: pwsh

    - name: Restore
      run: dotnet restore src/PowerPointMcp.McpServer/PowerPointMcp.McpServer.csproj

    - name: Build
      run: dotnet build src/PowerPointMcp.McpServer/PowerPointMcp.McpServer.csproj --configuration Release --no-restore -p:Version=${{ env.VERSION }} -p:AssemblyVersion=${{ env.VERSION }}.0 -p:FileVersion=${{ env.VERSION }}.0

    - name: Pack NuGet (secondary distribution)
      run: dotnet pack src/PowerPointMcp.McpServer/PowerPointMcp.McpServer.csproj --configuration Release --no-build --output ./nupkg -p:Version=${{ env.VERSION }}

    - name: Publish MCP Server (standalone exe — primary distribution)
      run: |
        dotnet publish src/PowerPointMcp.McpServer/PowerPointMcp.McpServer.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -p:PublishReadyToRun=false `
          -p:Version=${{ env.VERSION }} `
          -p:AssemblyVersion=${{ env.VERSION }}.0 `
          -p:FileVersion=${{ env.VERSION }}.0 `
          -p:NuGetAudit=false `
          --output ./mcp-server-publish
      shell: pwsh

    - name: Rename exe to mcp-powerpoint.exe
      run: |
        $expectedExe = "mcp-server-publish/Sbroenne.PowerPointMcp.McpServer.exe"
        if (Test-Path $expectedExe) {
          Rename-Item $expectedExe "mcp-powerpoint.exe"
        } else {
          Write-Error "Expected executable not found at: $expectedExe"
          Write-Host "Contents of mcp-server-publish/:"
          Get-ChildItem "mcp-server-publish/" | Select-Object Name
          exit 1
        }
      shell: pwsh

    - name: Create Release Package
      run: |
        $version = $env:VERSION
        New-Item -ItemType Directory -Path "mcp-server-release" -Force
        Copy-Item "mcp-server-publish/mcp-powerpoint.exe" "mcp-server-release/"
        Copy-Item "README.md" "mcp-server-release/"
        Copy-Item "LICENSE" "mcp-server-release/"
        Compress-Archive -Path "mcp-server-release/*" -DestinationPath "PowerPointMcp-MCP-Server-$version-windows.zip"
      shell: pwsh

    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcp-server-zip
        path: PowerPointMcp-MCP-Server-*-windows.zip

    - name: Upload NuGet Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcp-server-nupkg
        path: nupkg/*.nupkg

  # =============================================================================
  # Job 3: Build and Publish VS Code Extension
  # =============================================================================
  build-vscode:
    name: VS Code Extension
    needs: [version]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Update Project Versions
      run: |
        $version = $env:VERSION

        # Update Directory.Build.props (single source of truth for all project versions)
        $propsPath = "Directory.Build.props"
        $content = Get-Content $propsPath -Raw
        $content = $content -replace '<Version>[\d\.]+</Version>', "<Version>$version</Version>"
        $content = $content -replace '<AssemblyVersion>[\d\.]+\.[\d\.]+</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>"
        $content = $content -replace '<FileVersion>[\d\.]+\.[\d\.]+</FileVersion>', "<FileVersion>$version.0</FileVersion>"
        Set-Content $propsPath $content
      shell: pwsh

    - name: Update Extension Version
      run: |
        $version = $env:VERSION
        cd vscode-extension
        # --allow-same-version: this ephemeral bump is never committed back to the repo (the
        # extension's package.json baseline stays fixed), so a future release version can
        # coincidentally match it — npm version would otherwise fail with "Version not changed".
        npm version "$version" --no-git-tag-version --allow-same-version
      shell: pwsh

    - name: Sync Extension Changelog
      run: |
        Copy-Item "CHANGELOG.md" "vscode-extension/CHANGELOG.md" -Force
      shell: pwsh

    - name: Install Dependencies
      run: |
        cd vscode-extension
        npm install

    - name: Build and Package
      run: |
        cd vscode-extension
        npm run package

    - name: Rename VSIX
      run: |
        $version = $env:VERSION
        cd vscode-extension
        $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1
        $targetName = "powerpoint-mcp-$version.vsix"
        if ($vsix.Name -ne $targetName) {
          Rename-Item $vsix.FullName -NewName $targetName
        }
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscode-vsix
        path: vscode-extension/powerpoint-mcp-*.vsix

  # =============================================================================
  # Job 4: Build MCPB (Claude Desktop Bundle)
  # =============================================================================
  build-mcpb:
    name: MCPB Bundle
    needs: [version]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Build MCPB Bundle
      run: |
        cd mcpb
        .\Build-McpBundle.ps1 -Version $env:VERSION
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcpb-bundle
        path: mcpb/artifacts/powerpoint-mcp-*.mcpb

  # =============================================================================
  # Job 5: Build Agent Skills Package
  # =============================================================================
  build-agent-skills:
    name: Agent Skills
    needs: [version]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Create Skills Package
      run: |
        $version = $env:VERSION
        $outputDir = "artifacts/skills"
        $skillsDir = "skills"

        # Create output directory
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        # Create staging directory
        $stagingDir = Join-Path $env:TEMP "powerpoint-skills-$([guid]::NewGuid().ToString('N').Substring(0,8))"
        New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

        try {
          # Create skills/ subdirectory (the standard location for npx skills add)
          $skillsStagingDir = Join-Path $stagingDir "skills"
          New-Item -ItemType Directory -Path $skillsStagingDir -Force | Out-Null

          # Copy powerpoint-mcp skill (SKILL.md and references)
          Copy-Item -Path "$skillsDir/powerpoint-mcp" -Destination "$skillsStagingDir/powerpoint-mcp" -Recurse

          # Copy skills README to root of package
          if (Test-Path "$skillsDir/README.md") {
            Copy-Item -Path "$skillsDir/README.md" -Destination $stagingDir
          }

          # Create ZIP archive
          $zipPath = Join-Path $outputDir "powerpoint-skills-v$version.zip"
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "Created: $zipPath"

        } finally {
          Remove-Item $stagingDir -Recurse -Force -ErrorAction SilentlyContinue
        }

        # Copy platform-specific files
        if (Test-Path "$skillsDir/CLAUDE.md") {
          Copy-Item -Path "$skillsDir/CLAUDE.md" -Destination $outputDir
        }
        if (Test-Path "$skillsDir/.cursorrules") {
          Copy-Item -Path "$skillsDir/.cursorrules" -Destination $outputDir
        }

        # Generate manifest.json
        $manifest = @{
          name = "powerpoint-skills"
          version = $version
          description = "PowerPoint MCP Server Agent Skills for AI coding assistants"
          platforms = @("github-copilot", "claude-code", "cursor", "windsurf", "gemini-cli", "goose", "codex", "opencode", "amp", "kilo", "roo", "trae")
          skills = @(
            @{
              name = "powerpoint-mcp"
              path = "skills/powerpoint-mcp"
              description = "MCP Server skill - PowerPoint deck authoring for conversational AI (Claude Desktop, VS Code Chat)"
              target = "MCP Server"
            }
          )
          installation = @{
            npx = "npx skills add sbroenne/mcp-server-powerpoint"
            selectSkill = "npx skills add sbroenne/mcp-server-powerpoint --skill powerpoint-mcp"
            installAll = "npx skills add sbroenne/mcp-server-powerpoint --skill '*'"
          }
          files = @(
            @{ name = "CLAUDE.md"; type = "config"; description = "Claude Code project instructions" }
            @{ name = ".cursorrules"; type = "config"; description = "Cursor project rules" }
          )
          repository = "https://github.com/sbroenne/mcp-server-powerpoint"
          documentation = "https://powerpointmcpserver.dev/"
          buildDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
        }
        $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path "$outputDir/manifest.json" -Encoding UTF8
        Write-Host "Created: manifest.json"
      shell: pwsh

    - name: Upload Skills Artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-skills
        path: artifacts/skills/powerpoint-skills-*.zip

  # =============================================================================
  # Job 6: Create Git Tag
  # =============================================================================
  create-tag:
    name: Create Git Tag
    needs: [version, build-cli, build-mcp-server, build-vscode, build-mcpb, build-agent-skills]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "Creating tag: $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  # =============================================================================
  # Job 7: Wait for NuGet Propagation + MCP Registry
  # =============================================================================
  publish-mcp-registry:
    name: MCP Registry
    needs: [version, publish, build-mcp-server]
    runs-on: windows-latest
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Update server.json Version
      run: |
        $version = $env:VERSION
        $serverJsonPath = "src/PowerPointMcp.McpServer/.mcp/server.json"
        $serverContent = Get-Content $serverJsonPath -Raw
        $serverContent = $serverContent -replace '("version":\s*)"[\d\.]+"(\s*,\s*\n\s*"packages")' , "`$1`"$version`"`$2"
        $serverContent = $serverContent -replace '("identifier":\s*"Sbroenne\.PowerPointMcp\.McpServer",\s*\n\s*"version":\s*)"[\d\.]+"', "`$1`"$version`""
        Set-Content $serverJsonPath $serverContent
      shell: pwsh

    - name: Wait for NuGet Propagation
      run: |
        $version = $env:VERSION
        $packageId = "sbroenne.powerpointmcp.mcpserver"
        $readmeUrl = "https://api.nuget.org/v3-flatcontainer/$packageId/$version/readme"

        Write-Output "Waiting for NuGet CDN propagation..."
        $maxAttempts = 3
        $pollInterval = 600  # 10 minutes

        # First check immediately; subsequent checks wait pollInterval seconds
        for ($i = 1; $i -le $maxAttempts; $i++) {
          Write-Output "Attempt $i of $maxAttempts..."
          try {
            $response = Invoke-WebRequest -Uri $readmeUrl -UseBasicParsing -ErrorAction Stop
            if ($response.StatusCode -eq 200) {
              $content = [System.Text.Encoding]::UTF8.GetString($response.Content)
              if ($content -match "mcp-name:\s+io\.github\.sbroenne/mcp-server-powerpoint") {
                Write-Output "README propagated successfully"
                break
              }
            }
          } catch {
            Write-Output "README not yet available"
          }
          if ($i -lt $maxAttempts) {
            Write-Output "Waiting $pollInterval seconds before retry..."
            Start-Sleep -Seconds $pollInterval
          }
        }
      shell: pwsh

    - name: Install MCP Publisher
      run: |
        $arch = if ([System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture -eq "Arm64") { "arm64" } else { "amd64" }
        Invoke-WebRequest -Uri "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_windows_$arch.tar.gz" -OutFile "mcp-publisher.tar.gz"
        tar xf mcp-publisher.tar.gz mcp-publisher.exe
      shell: pwsh

    - name: Publish to MCP Registry
      run: |
        ./mcp-publisher.exe login github-oidc
        Set-Location src/PowerPointMcp.McpServer/.mcp
        ../../../mcp-publisher.exe publish --verbose
      shell: pwsh
      continue-on-error: true

  # =============================================================================
  # Job 8: Publish to External Registries (after all builds succeed)
  # =============================================================================
  publish:
    name: Publish to Registries
    needs: [version, create-tag]
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write  # Required for NuGet OIDC

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Set Version
      run: |
        $version = "${{ needs.version.outputs.version }}"
        echo "VERSION=$version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Download NuGet Package
      uses: actions/download-artifact@v4
      with:
        name: mcp-server-nupkg
        path: nupkg

    - name: Download CLI NuGet Package
      uses: actions/download-artifact@v4
      with:
        name: cli-nupkg
        path: cli-nupkg

    - name: Download VS Code VSIX
      uses: actions/download-artifact@v4
      with:
        name: vscode-vsix
        path: vscode-vsix

    - name: NuGet Login (OIDC)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Publish to NuGet.org (secondary distribution)
      run: |
        $version = $env:VERSION
        dotnet nuget push "nupkg/Sbroenne.PowerPointMcp.McpServer.$version.nupkg" `
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} `
          --source https://api.nuget.org/v3/index.json `
          --skip-duplicate
        Write-Output "Published Sbroenne.PowerPointMcp.McpServer.$version to NuGet.org"

        dotnet nuget push "cli-nupkg/Sbroenne.PowerPointMcp.CLI.$version.nupkg" `
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} `
          --source https://api.nuget.org/v3/index.json `
          --skip-duplicate
        Write-Output "Published Sbroenne.PowerPointMcp.CLI.$version to NuGet.org"
      shell: pwsh

    - name: Publish to VS Code Marketplace
      uses: HaaLeo/publish-vscode-extension@v2
      with:
        pat: ${{ secrets.VSCE_TOKEN }}
        registryUrl: https://marketplace.visualstudio.com
        extensionFile: vscode-vsix/powerpoint-mcp-${{ env.VERSION }}.vsix
      continue-on-error: true

  # =============================================================================
  # Job 9: Create Unified GitHub Release
  # =============================================================================
  create-release:
    name: Create GitHub Release
    needs: [version, create-tag, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set Version
      run: |
        echo "VERSION=${{ needs.version.outputs.version }}" >> $GITHUB_ENV

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List Artifacts
      run: |
        echo "Downloaded artifacts:"
        find artifacts -type f -name "*" | head -20

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install changesets CLI
      run: npm install --no-save --registry https://registry.npmjs.org/

    - name: Compile changesets into CHANGELOG.md
      id: changelog
      shell: pwsh
      env:
        # @changesets/changelog-github needs a token to look up PR/commit info for changelog entries.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $releaseDate = Get-Date -AsUTC -Format 'yyyy-MM-dd'
        ./scripts/Build-Changelog.ps1 -Version "${{ env.VERSION }}" -Date $releaseDate

    - name: Render Release Notes
      shell: pwsh
      run: |
        $template = Get-Content -Raw '.github/release-notes-template.md'
        $changelogBody = Get-Content -Raw release_notes_body.md
        $notes = $template.Replace('{{VERSION}}', $env:VERSION).Replace('{{CHANGELOG}}', $changelogBody.Trim())
        Set-Content -Path release_notes.md -Value $notes -NoNewline

    - name: Create Release
      run: |
        VERSION=${{ env.VERSION }}
        TAG=${{ needs.version.outputs.tag }}

        # Collect all artifacts
        ARTIFACTS=""
        for f in artifacts/mcp-server-zip/*.zip; do [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"; done
        for f in artifacts/cli-zip/*.zip; do [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"; done
        for f in artifacts/vscode-vsix/*.vsix; do [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"; done
        for f in artifacts/mcpb-bundle/*.mcpb; do [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"; done
        for f in artifacts/agent-skills/*.zip; do [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"; done

        echo "Creating release with artifacts:$ARTIFACTS"

        gh release create "$TAG" $ARTIFACTS \
          --title "PowerPointMcp $VERSION" \
          --notes-file release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Create a PR to commit the CHANGELOG.md/package.json changes produced by
    # Build-Changelog.ps1 above (and the consumed .changeset/*.md deletions),
    # since branch protection prevents direct push.
    - name: Commit Changelog Update
      run: |
        VERSION=${{ env.VERSION }}
        BRANCH="chore/changelog-v${VERSION}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git checkout -b "$BRANCH"
        git add CHANGELOG.md package.json .changeset
        git commit -m "chore: update CHANGELOG.md for v${VERSION} release [skip ci]"
        git push origin "$BRANCH"

        gh pr create \
          --base main \
          --head "$BRANCH" \
          --title "chore: update CHANGELOG.md for v${VERSION} release" \
          --body "Automated post-release changelog update: compiles pending .changeset/*.md fragments into a new \`## [$VERSION]\` entry in CHANGELOG.md via \`scripts/Build-Changelog.ps1\`." \
          --label "documentation"

        # Merge the changelog PR automatically. Previously this PR was only
        # *created*, never merged, so it would sit open until a maintainer
        # merged it by hand -- letting releases pile up with a stale/missing
        # CHANGELOG on main. Prefer queued auto-merge (requires "Allow
        # auto-merge" in repo settings); fall back to an immediate merge when
        # auto-merge is disabled. The commit above uses [skip ci] so there are
        # no required checks blocking the merge.
        gh pr merge "$BRANCH" --squash --delete-branch --auto \
          || gh pr merge "$BRANCH" --squash --delete-branch
      # Intentionally NOT continue-on-error: a silently swallowed failure here
      # (e.g. Actions lacking permission to create PRs) would leave a release
      # missing its changelog commit-back PR. Let this step fail loudly so it
      # gets noticed and fixed immediately.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
